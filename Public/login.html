<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sign In – Ayini Home Products</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background:var(--gray-50); }
    .auth-page { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
    .auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:32px; text-decoration:none; }
    .auth-logo img { width:48px; height:48px; border-radius:50%; border:2px solid rgba(200,136,42,.3); }
    .auth-logo-name { font-family:var(--font-display); font-size:1.3rem; font-weight:700; color:var(--green); }
    .auth-logo-name span { color:var(--amber); }
    .auth-box { background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); width:100%; max-width:440px; overflow:hidden; }
    .auth-box-header { background:linear-gradient(135deg,var(--green),var(--green-light)); padding:32px 36px 28px; text-align:center; }
    .auth-box-header h1 { color:white; font-size:1.5rem; margin-bottom:6px; }
    .auth-box-header p  { color:rgba(255,255,255,.8); font-size:.88rem; }
    .auth-box-body { padding:32px 36px 36px; }
    .field { margin-bottom:20px; }
    .field label { display:block; font-size:.85rem; font-weight:600; color:var(--gray-700,#374151); margin-bottom:7px; }
    .field input { width:100%; padding:11px 14px; border:1.5px solid var(--gray-200); border-radius:var(--radius); font-family:var(--font-body); font-size:.95rem; color:var(--text); background:white; transition:border-color var(--transition),box-shadow var(--transition); outline:none; }
    .field input:focus { border-color:var(--green-light); box-shadow:0 0 0 3px rgba(46,107,69,.1); }
    .field input.error { border-color:#ef4444; }
    .field-row { display:flex; justify-content:space-between; align-items:center; }
    .field-err { font-size:.78rem; color:#ef4444; margin-top:5px; display:none; }
    .forgot-link { font-size:.82rem; color:var(--green); font-weight:500; }
    .forgot-link:hover { text-decoration:underline; }
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:44px; }
    .pw-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--gray-400); padding:4px; display:flex; align-items:center; }
    .pw-toggle:hover { color:var(--gray-600); }
    .submit-btn { width:100%; padding:13px; background:var(--green); color:white; border:none; border-radius:var(--radius); font-family:var(--font-body); font-size:1rem; font-weight:600; cursor:pointer; transition:background var(--transition),transform .1s; margin-top:4px; }
    .submit-btn:hover { background:var(--green-mid); }
    .submit-btn:active { transform:scale(.98); }
    .submit-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--gray-400); font-size:.82rem; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--gray-200); }
    .social-btn { width:100%; padding:11px 16px; border:1.5px solid var(--gray-200); border-radius:var(--radius); background:white; display:flex; align-items:center; justify-content:center; gap:10px; font-family:var(--font-body); font-size:.9rem; font-weight:500; cursor:pointer; transition:all var(--transition); margin-bottom:10px; color:var(--gray-800,#1f2937); }
    .social-btn:hover { background:var(--gray-50); border-color:var(--gray-300); }
    .auth-switch { text-align:center; margin-top:24px; font-size:.88rem; color:var(--gray-500); }
    .auth-switch a { color:var(--green); font-weight:600; }
    .auth-switch a:hover { text-decoration:underline; }
    .alert-box { padding:12px 16px; border-radius:var(--radius); font-size:.88rem; font-weight:500; margin-bottom:20px; display:none; }
    .alert-box.success { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .alert-box.error   { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
  </style>
</head>
<body>
<main class="auth-page">
  <a href="index.html" class="auth-logo">
    <img src="https://raw.githubusercontent.com/Sanjay123ps/ayini-website/main/AYINI.png" alt="Ayini" onerror="this.style.cssText='width:48px;height:48px;border-radius:50%;background:var(--green);'">
    <span class="auth-logo-name">Ayini <span>Home</span> 🌿</span>
  </a>

  <div class="auth-box">
    <div class="auth-box-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your Ayini account</p>
    </div>
    <div class="auth-box-body">
      <div class="alert-box" id="alertBox"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
          <p class="field-err" id="emailErr">Please enter a valid email address.</p>
        </div>
        <div class="field">
          <div class="field-row">
            <label for="password">Password</label>
            <a href="forgot.html" class="forgot-link">Forgot password?</a>
          </div>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('password',this)" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <p class="field-err" id="passErr">Password is required.</p>
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
      </form>

      <div class="divider">or continue with</div>
      <button class="social-btn" onclick="alert('Google login coming soon!')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <button class="social-btn" onclick="alert('Facebook login coming soon!')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Continue with Facebook
      </button>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Create one</a></p>
    </div>
  </div>
</main>

<script src="api.js"></script>
<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.querySelector('svg').innerHTML = show
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  box.className = 'alert-box ' + type;
  box.style.display = 'block';
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  let ok = true;
  document.querySelectorAll('.field-err').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.field input').forEach(el => el.classList.remove('error'));
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('emailErr').style.display = 'block';
    document.getElementById('email').classList.add('error');
    ok = false;
  }
  if (!pass) {
    document.getElementById('passErr').style.display = 'block';
    document.getElementById('password').classList.add('error');
    ok = false;
  }
  if (!ok) return;
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const data = await AuthAPI.login(email, pass);
    Auth.setSession(data.token, data.user);
    showAlert('Login successful! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'index.html', 900);
  } catch(err) {
    showAlert(err.message || 'Login failed. Please try again.', 'error');
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
});
</script>
</body>
</html>
