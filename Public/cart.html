<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Your Cart – Ayini Home Products</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cart-page { background:var(--gray-50); min-height:80vh; padding:36px 0 64px; }
    .cart-grid { display:grid; grid-template-columns:1fr 340px; gap:24px; align-items:start; }
    .cart-card { background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); border:1px solid var(--gray-200); overflow:hidden; }
    .cart-card-head { padding:18px 24px; border-bottom:1px solid var(--gray-100); display:flex; align-items:center; justify-content:space-between; }
    .cart-card-head h2 { font-size:1rem; font-weight:600; color:var(--text); font-family:var(--font-body); }
    .clear-btn { font-size:.8rem; color:#ef4444; background:none; border:none; cursor:pointer; padding:4px 8px; border-radius:6px; }
    .clear-btn:hover { background:#fef2f2; }
    .cart-item { display:grid; grid-template-columns:64px 1fr auto auto; gap:14px; align-items:center; padding:18px 24px; border-bottom:1px solid var(--gray-100); transition:background var(--transition); }
    .cart-item:last-child { border-bottom:none; }
    .cart-item:hover { background:var(--gray-50); }
    .ci-thumb { width:64px; height:64px; background:linear-gradient(135deg,#f7f2e8,#ede5d0); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:2rem; flex-shrink:0; }
    .ci-info h4 { font-size:.92rem; font-weight:600; color:var(--text); margin-bottom:3px; line-height:1.3; }
    .ci-info .ci-unit { font-size:.78rem; color:var(--gray-400); margin-bottom:6px; }
    .ci-info .ci-price { font-size:.88rem; color:var(--gray-500); }
    .ci-qty { display:flex; align-items:center; border:1.5px solid var(--gray-200); border-radius:var(--radius); overflow:hidden; height:36px; }
    .ci-qty button { width:32px; height:36px; background:var(--gray-100); border:none; font-size:1rem; cursor:pointer; color:var(--green); transition:background var(--transition); }
    .ci-qty button:hover { background:#dcfce7; }
    .ci-qty span { min-width:30px; text-align:center; font-weight:700; font-size:.9rem; }
    .ci-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
    .ci-subtotal { font-size:1rem; font-weight:700; color:var(--text); white-space:nowrap; }
    .ci-del { background:none; border:none; color:var(--gray-400); cursor:pointer; padding:4px; border-radius:6px; font-size:1.1rem; transition:color var(--transition),background var(--transition); }
    .ci-del:hover { color:#ef4444; background:#fef2f2; }
    .coupon-area { padding:16px 24px; border-top:1px solid var(--gray-100); background:var(--gray-50); display:flex; gap:10px; align-items:flex-start; flex-direction:column; }
    .coupon-row { display:flex; gap:8px; width:100%; }
    .coupon-row input { flex:1; padding:10px 14px; border:1.5px solid var(--gray-200); border-radius:var(--radius); font-family:var(--font-body); font-size:.88rem; text-transform:uppercase; outline:none; transition:border-color var(--transition); }
    .coupon-row input:focus { border-color:var(--green); }
    .coupon-row button { background:var(--green); color:white; padding:10px 18px; border-radius:var(--radius); font-weight:600; font-size:.88rem; border:none; cursor:pointer; white-space:nowrap; transition:background var(--transition); }
    .coupon-row button:hover { background:var(--green-mid); }
    .coupon-msg { font-size:.8rem; font-weight:500; }
    .coupon-msg.ok  { color:#16a34a; }
    .coupon-msg.err { color:#ef4444; }
    .summary-card { background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); border:1px solid var(--gray-200); padding:24px; position:sticky; top:100px; }
    .summary-card h3 { font-size:1rem; font-weight:700; color:var(--text); font-family:var(--font-body); padding-bottom:14px; border-bottom:1px solid var(--gray-100); margin-bottom:16px; }
    .sum-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:.9rem; color:var(--gray-600); }
    .sum-row.total { font-weight:700; font-size:1.05rem; color:var(--text); padding-top:14px; border-top:2px solid var(--gray-200); margin-top:4px; }
    .sum-row.disc { color:#16a34a; font-weight:600; }
    .free-ship-bar { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:var(--radius); padding:10px 14px; font-size:.82rem; color:#166534; margin:14px 0; text-align:center; }
    .free-ship-progress { height:5px; background:var(--gray-200); border-radius:3px; margin-top:8px; overflow:hidden; }
    .free-ship-fill { height:100%; background:var(--green); border-radius:3px; transition:width .5s ease; }
    .checkout-btn { width:100%; padding:14px; background:var(--green); color:white; border:none; border-radius:var(--radius); font-family:var(--font-body); font-size:1rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background var(--transition),transform .1s,box-shadow var(--transition); margin-top:14px; }
    .checkout-btn:hover:not(:disabled) { background:var(--green-mid); transform:translateY(-1px); box-shadow:0 6px 20px rgba(26,58,42,.25); }
    .checkout-btn:disabled { opacity:.5; cursor:not-allowed; }
    .continue-link { display:block; text-align:center; margin-top:12px; font-size:.85rem; color:var(--green); }
    .continue-link:hover { text-decoration:underline; }
    .empty-cart { padding:64px 24px; text-align:center; }
    .empty-cart .icon { font-size:4rem; margin-bottom:16px; }
    .empty-cart h3 { font-size:1.2rem; color:var(--gray-600); margin-bottom:8px; }
    .empty-cart p  { font-size:.9rem; color:var(--gray-400); margin-bottom:24px; }
    @media(max-width:900px){ .cart-grid{grid-template-columns:1fr;} .summary-card{position:static;} }
    @media(max-width:600px){ .cart-item{grid-template-columns:56px 1fr; gap:10px;} .ci-right{flex-direction:row; align-items:center;} }
  </style>
</head>
<body>
<header class="site-header">
  <div class="header-top">
    <a href="index.html" class="logo">
      <img src="https://raw.githubusercontent.com/Sanjay123ps/ayini-website/main/AYINI.png" alt="Ayini Logo" onerror="this.style.cssText='width:44px;height:44px;border-radius:50%;background:var(--green);'">
      <div class="logo-text">
        <strong>Ayini <span style="color:var(--amber)">Home</span> 🌿</strong>
        <span>Homemade · Natural · Coimbatore</span>
      </div>
    </a>
    <nav class="header-actions">
      <a href="login.html" id="loginLink">Login</a>
      <a href="cart.html" class="cart-btn">🛒 Cart <span class="cart-badge" id="cartBadge">0</span></a>
    </nav>
  </div>
</header>

<div class="page-hero">
  <div class="container">
    <h1>🛒 Your Cart</h1>
    <p>Review your items before checkout</p>
    <div class="breadcrumb"><a href="index.html">Home</a><span>›</span><span>Cart</span></div>
  </div>
</div>

<div class="cart-page">
  <div class="container">
    <div class="cart-grid">

      <!-- Left: Items -->
      <div>
        <div class="cart-card">
          <div class="cart-card-head">
            <h2>Cart Items (<span id="itemCount">0</span>)</h2>
            <button class="clear-btn" onclick="clearCart()">🗑 Clear all</button>
          </div>
          <div id="cartItems">
            <div class="empty-cart"><div class="spinner"></div><p>Loading your cart…</p></div>
          </div>
          <!-- Coupon -->
          <div class="coupon-area">
            <div class="coupon-row">
              <input type="text" id="couponInput" placeholder="ENTER COUPON CODE" maxlength="20">
              <button onclick="applyCoupon()">Apply</button>
            </div>
            <span class="coupon-msg" id="couponMsg"></span>
          </div>
        </div>
      </div>

      <!-- Right: Summary -->
      <div>
        <div class="summary-card">
          <h3>Order Summary</h3>
          <div class="sum-row"><span>Subtotal</span><span id="sumSubtotal">₹0</span></div>
          <div class="sum-row"><span>Shipping</span><span id="sumShipping">₹50</span></div>
          <div class="sum-row disc" id="discRow" style="display:none"><span>Discount</span><span id="sumDiscount">–₹0</span></div>
          <div class="sum-row total"><span>Total</span><span id="sumTotal">₹0</span></div>
          <div class="free-ship-bar" id="freeShipBar">
            🛵 Add ₹<span id="freeRemain">500</span> more for <strong>FREE shipping!</strong>
            <div class="free-ship-progress"><div class="free-ship-fill" id="freeProgress" style="width:0%"></div></div>
          </div>
          <button class="checkout-btn" id="checkoutBtn" onclick="window.location.href='checkout.html'" disabled>
            Proceed to Checkout →
          </button>
          <a href="index.html" class="continue-link">← Continue Shopping</a>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
const EMOJIS = {masala:'🌶️',powder:'🫙',rice:'🍚',millet:'🌾',oil:'🫙',soap:'🧼',noodles:'🍜',flour:'🌾',default:'🌿'};
let cartData = null, discount = 0, couponCode = '';

function getEmoji(name) {
  const n = (name||'').toLowerCase();
  if (n.includes('masala')||n.includes('chilli')||n.includes('pepper')) return '🌶️';
  if (n.includes('oil')) return '🫙';
  if (n.includes('soap')) return '🧼';
  if (n.includes('noodle')||n.includes('semiya')) return '🍜';
  if (n.includes('rice')||n.includes('kavuni')) return '🍚';
  if (n.includes('ragi')||n.includes('millet')||n.includes('flour')||n.includes('wheat')) return '🌾';
  return '🌿';
}

async function loadCart() {
  if (!Auth.isLoggedIn()) {
    document.getElementById('cartItems').innerHTML = `
      <div class="empty-cart">
        <div class="icon">🔐</div>
        <h3>Please login to view your cart</h3>
        <p>Sign in to see your saved items</p>
        <a href="login.html" class="btn btn-primary" style="margin-top:4px;">Sign In</a>
      </div>`;
    return;
  }
  try {
    cartData = await CartAPI.get();
    renderCart();
  } catch(e) {
    document.getElementById('cartItems').innerHTML = `<div class="empty-cart"><div class="icon">⚠️</div><h3>${e.message}</h3></div>`;
  }
}

function renderCart() {
  if (!cartData || !cartData.items.length) {
    document.getElementById('cartItems').innerHTML = `
      <div class="empty-cart">
        <div class="icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Looks like you haven't added anything yet</p>
        <a href="index.html" class="btn btn-primary" style="margin-top:4px;">Shop Now</a>
      </div>`;
    document.getElementById('itemCount').textContent = '0';
    document.getElementById('checkoutBtn').disabled = true;
    updateSummary(0, 50, 0);
    return;
  }
  document.getElementById('itemCount').textContent = cartData.items.length;
  document.getElementById('checkoutBtn').disabled = false;
  document.getElementById('cartItems').innerHTML = cartData.items.map(item => `
    <div class="cart-item" id="ci-${item.product_id}">
      <div class="ci-thumb">${getEmoji(item.name)}</div>
      <div class="ci-info">
        <h4>${item.name}</h4>
        <p class="ci-unit">${item.unit || ''}</p>
        <p class="ci-price">₹${item.price} each</p>
      </div>
      <div class="ci-qty">
        <button onclick="changeQty(${item.product_id}, ${item.quantity - 1})" aria-label="Decrease">−</button>
        <span id="qty-${item.product_id}">${item.quantity}</span>
        <button onclick="changeQty(${item.product_id}, ${item.quantity + 1})" aria-label="Increase">+</button>
      </div>
      <div class="ci-right">
        <span class="ci-subtotal">₹${(item.price * item.quantity).toFixed(0)}</span>
        <button class="ci-del" onclick="removeItem(${item.product_id})" title="Remove item">🗑</button>
      </div>
    </div>`).join('');
  updateSummary(cartData.subtotal, cartData.shipping, discount);
}

function updateSummary(sub, ship, disc) {
  const FREE_THRESHOLD = 500;
  document.getElementById('sumSubtotal').textContent = '₹' + sub.toFixed(0);
  document.getElementById('sumShipping').textContent = ship === 0 ? 'FREE 🎉' : '₹' + ship;
  document.getElementById('sumTotal').textContent = '₹' + Math.max(0, sub + ship - disc).toFixed(0);
  if (disc > 0) {
    document.getElementById('discRow').style.display = 'flex';
    document.getElementById('sumDiscount').textContent = '–₹' + disc;
  }
  const remain = Math.max(0, FREE_THRESHOLD - sub);
  const bar = document.getElementById('freeShipBar');
  if (remain === 0) {
    bar.innerHTML = '🎉 <strong>You have FREE shipping!</strong>';
    bar.style.background = '#f0fdf4';
  } else {
    const pct = Math.min(100, (sub / FREE_THRESHOLD) * 100).toFixed(0);
    bar.innerHTML = `🛵 Add <strong>₹${remain.toFixed(0)}</strong> more for <strong>FREE shipping!</strong>
      <div class="free-ship-progress"><div class="free-ship-fill" style="width:${pct}%"></div></div>`;
  }
}

async function changeQty(pid, qty) {
  if (qty < 1) { removeItem(pid); return; }
  try {
    cartData = await CartAPI.update(pid, qty);
    renderCart();
    updateCartBadge();
  } catch(e) { showToast(e.message, true); }
}

async function removeItem(pid) {
  const row = document.getElementById('ci-' + pid);
  if (row) { row.style.opacity = '0.4'; row.style.pointerEvents = 'none'; }
  try {
    cartData = await CartAPI.remove(pid);
    renderCart();
    updateCartBadge();
  } catch(e) {
    if (row) { row.style.opacity = ''; row.style.pointerEvents = ''; }
    showToast(e.message, true);
  }
}

async function clearCart() {
  if (!confirm('Remove all items from cart?')) return;
  try {
    await CartAPI.clear();
    cartData = { items:[], subtotal:0, shipping:50 };
    renderCart();
    updateCartBadge();
  } catch(e) { showToast(e.message, true); }
}

async function applyCoupon() {
  const code = document.getElementById('couponInput').value.trim().toUpperCase();
  const msg = document.getElementById('couponMsg');
  if (!code) { msg.className = 'coupon-msg err'; msg.textContent = 'Please enter a coupon code.'; return; }
  try {
    const r = await CartAPI.coupon(code);
    discount = r.discount; couponCode = code;
    msg.className = 'coupon-msg ok'; msg.textContent = '✅ ' + r.message;
    updateSummary(cartData.subtotal, cartData.shipping, discount);
  } catch(e) {
    msg.className = 'coupon-msg err'; msg.textContent = '❌ ' + e.message;
  }
}

document.addEventListener('DOMContentLoaded', loadCart);
</script>
</body>
</html>
