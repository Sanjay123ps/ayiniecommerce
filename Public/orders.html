<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>My Orders – Ayini Home Products</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .orders-page { background:var(--gray-50); min-height:80vh; padding:36px 0 64px; }
    .orders-grid { display:grid; grid-template-columns:240px 1fr; gap:24px; align-items:start; }
    .sidebar { background:white; border-radius:var(--radius-lg); border:1px solid var(--gray-200); overflow:hidden; position:sticky; top:100px; }
    .sidebar-user { background:linear-gradient(135deg,var(--green),var(--green-light)); padding:24px; text-align:center; }
    .sidebar-avatar { width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,.2); border:3px solid rgba(255,255,255,.4); display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:700; color:white; margin:0 auto 10px; font-family:var(--font-display); }
    .sidebar-name { color:white; font-weight:700; font-size:1rem; margin-bottom:3px; }
    .sidebar-email { color:rgba(255,255,255,.7); font-size:.78rem; }
    .sidebar-nav { padding:8px 0; }
    .sidebar-link { display:flex; align-items:center; gap:10px; padding:12px 20px; font-size:.88rem; font-weight:500; color:var(--gray-600); transition:all var(--transition); text-decoration:none; border-left:3px solid transparent; }
    .sidebar-link:hover { background:var(--gray-50); color:var(--green); }
    .sidebar-link.active { color:var(--green); background:#f0fdf4; border-left-color:var(--green); font-weight:600; }
    .sidebar-link .licon { font-size:1rem; width:20px; text-align:center; }
    .sidebar-logout { display:flex; align-items:center; gap:10px; padding:12px 20px; font-size:.88rem; font-weight:500; color:#ef4444; cursor:pointer; border:none; background:none; width:100%; border-top:1px solid var(--gray-100); margin-top:4px; }
    .sidebar-logout:hover { background:#fef2f2; }
    .orders-main {}
    .filter-bar { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .filter-btn { padding:7px 16px; border-radius:20px; border:1.5px solid var(--gray-200); background:white; font-size:.82rem; font-weight:500; cursor:pointer; transition:all var(--transition); color:var(--gray-600); }
    .filter-btn:hover { border-color:var(--green); color:var(--green); }
    .filter-btn.active { background:var(--green); color:white; border-color:var(--green); }
    .order-card { background:white; border-radius:var(--radius-lg); border:1px solid var(--gray-200); margin-bottom:16px; overflow:hidden; transition:box-shadow var(--transition); }
    .order-card:hover { box-shadow:var(--shadow-md); }
    .order-head { padding:16px 20px; display:grid; grid-template-columns:1fr auto; gap:12px; border-bottom:1px solid var(--gray-100); align-items:center; }
    .order-meta { display:flex; gap:20px; align-items:center; flex-wrap:wrap; }
    .order-num { font-weight:700; font-size:.9rem; color:var(--green); }
    .order-date { font-size:.8rem; color:var(--gray-400); }
    .order-total { font-weight:700; font-size:.95rem; color:var(--text); }
    .status-badge { padding:4px 12px; border-radius:20px; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; flex-shrink:0; }
    .status-pending    { background:#fef3c7; color:#92400e; }
    .status-confirmed  { background:#dbeafe; color:#1e40af; }
    .status-processing { background:#e0e7ff; color:#3730a3; }
    .status-shipped    { background:#d1fae5; color:#065f46; }
    .status-delivered  { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .status-cancelled  { background:#fef2f2; color:#991b1b; }
    .order-items { padding:16px 20px; }
    .order-item-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--gray-100); }
    .order-item-row:last-child { border-bottom:none; }
    .oi-thumb { width:44px; height:44px; background:linear-gradient(135deg,#f7f2e8,#ede5d0); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
    .oi-info { flex:1; }
    .oi-info h4 { font-size:.88rem; font-weight:600; color:var(--text); margin-bottom:2px; }
    .oi-info p  { font-size:.76rem; color:var(--gray-400); }
    .oi-price { font-size:.9rem; font-weight:700; color:var(--text); white-space:nowrap; }
    .order-foot { padding:14px 20px; background:var(--gray-50); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; border-top:1px solid var(--gray-100); }
    .order-foot-left { font-size:.8rem; color:var(--gray-500); display:flex; align-items:center; gap:6px; }
    .order-foot-right { display:flex; gap:8px; flex-wrap:wrap; }
    .action-btn { padding:7px 16px; border-radius:var(--radius); font-size:.8rem; font-weight:600; cursor:pointer; border:1.5px solid; transition:all var(--transition); }
    .action-btn.reorder  { background:var(--green); color:white; border-color:var(--green); }
    .action-btn.reorder:hover { background:var(--green-mid); }
    .action-btn.track    { background:white; color:var(--green); border-color:var(--green); }
    .action-btn.track:hover { background:#f0fdf4; }
    .action-btn.cancel   { background:white; color:#ef4444; border-color:#ef4444; }
    .action-btn.cancel:hover { background:#fef2f2; }
    .track-modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:800; display:none; align-items:center; justify-content:center; }
    .track-modal-bg.show { display:flex; }
    .track-modal { background:white; border-radius:var(--radius-lg); padding:32px; max-width:480px; width:92%; animation:popIn .3s ease; max-height:90vh; overflow-y:auto; }
    @keyframes popIn { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }
    .track-modal h3 { font-size:1.1rem; color:var(--green); margin-bottom:20px; }
    .track-modal .close-btn { float:right; background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--gray-400); margin-top:-4px; }
    .timeline { position:relative; padding-left:32px; }
    .timeline::before { content:''; position:absolute; left:10px; top:8px; bottom:8px; width:2px; background:var(--gray-200); }
    .tl-item { position:relative; padding-bottom:24px; }
    .tl-item:last-child { padding-bottom:0; }
    .tl-dot { position:absolute; left:-26px; top:4px; width:16px; height:16px; border-radius:50%; border:2px solid var(--gray-200); background:white; z-index:1; transition:all .3s; }
    .tl-item.done .tl-dot  { background:var(--green); border-color:var(--green); }
    .tl-item.active .tl-dot { background:var(--amber); border-color:var(--amber); box-shadow:0 0 0 4px rgba(200,136,42,.2); }
    .tl-title { font-size:.9rem; font-weight:600; color:var(--gray-400); margin-bottom:3px; }
    .tl-item.done .tl-title,.tl-item.active .tl-title { color:var(--text); }
    .tl-time  { font-size:.76rem; color:var(--gray-400); }
    .empty-orders { background:white; border-radius:var(--radius-lg); border:1px solid var(--gray-200); padding:72px 24px; text-align:center; }
    .empty-orders .icon { font-size:4rem; margin-bottom:16px; }
    .empty-orders h3 { color:var(--gray-600); margin-bottom:8px; }
    .empty-orders p  { color:var(--gray-400); font-size:.9rem; margin-bottom:24px; }
    .summary-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
    .stat-card { background:white; border-radius:var(--radius-lg); border:1px solid var(--gray-200); padding:18px 16px; text-align:center; }
    .stat-card .num { font-family:var(--font-display); font-size:1.8rem; font-weight:700; color:var(--green); display:block; line-height:1; margin-bottom:6px; }
    .stat-card .lbl { font-size:.78rem; color:var(--gray-500); }
    @media(max-width:900px){ .orders-grid{grid-template-columns:1fr;} .sidebar{position:static;} }
    @media(max-width:600px){ .summary-stats{grid-template-columns:1fr 1fr;} .order-head{grid-template-columns:1fr;} .order-meta{flex-direction:column;align-items:flex-start;gap:6px;} }
  </style>
</head>
<body>
<header class="site-header">
  <div class="header-top">
    <a href="index.html" class="logo">
      <img src="https://raw.githubusercontent.com/Sanjay123ps/ayini-website/main/AYINI.png" alt="Ayini" onerror="this.style.cssText='width:44px;height:44px;border-radius:50%;background:var(--green);'">
      <div class="logo-text">
        <strong>Ayini <span style="color:var(--amber)">Home</span> 🌿</strong>
        <span>Homemade · Natural · Coimbatore</span>
      </div>
    </a>
    <nav class="header-actions">
      <a href="profile.html" id="loginLink">My Account</a>
      <a href="cart.html" class="cart-btn">🛒 Cart <span class="cart-badge" id="cartBadge">0</span></a>
    </nav>
  </div>
</header>

<div class="page-hero">
  <div class="container">
    <h1>📦 My Orders</h1>
    <p>Track and manage all your past orders</p>
    <div class="breadcrumb"><a href="index.html">Home</a><span>›</span><span>My Orders</span></div>
  </div>
</div>

<div class="orders-page">
  <div class="container">
    <div class="orders-grid">

      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">?</div>
          <div class="sidebar-name" id="sidebarName">Loading…</div>
          <div class="sidebar-email" id="sidebarEmail"></div>
        </div>
        <nav class="sidebar-nav">
          <a href="profile.html" class="sidebar-link"><span class="licon">👤</span> My Profile</a>
          <a href="orders.html"  class="sidebar-link active"><span class="licon">📦</span> My Orders</a>
          <a href="cart.html"    class="sidebar-link"><span class="licon">🛒</span> My Cart</a>
          <a href="index.html"   class="sidebar-link"><span class="licon">🏠</span> Continue Shopping</a>
        </nav>
        <button class="sidebar-logout" onclick="Auth.logout()">
          <span class="licon">🚪</span> Logout
        </button>
      </div>

      <!-- Main -->
      <div class="orders-main">

        <!-- Stats -->
        <div class="summary-stats" id="statsRow">
          <div class="stat-card"><span class="num" id="statTotal">—</span><span class="lbl">Total Orders</span></div>
          <div class="stat-card"><span class="num" id="statDelivered">—</span><span class="lbl">Delivered</span></div>
          <div class="stat-card"><span class="num" id="statSpent">—</span><span class="lbl">Total Spent</span></div>
        </div>

        <!-- Filter -->
        <div class="filter-bar">
          <button class="filter-btn active" onclick="filterOrders('all',this)">All Orders</button>
          <button class="filter-btn" onclick="filterOrders('pending',this)">Pending</button>
          <button class="filter-btn" onclick="filterOrders('confirmed',this)">Confirmed</button>
          <button class="filter-btn" onclick="filterOrders('shipped',this)">Shipped</button>
          <button class="filter-btn" onclick="filterOrders('delivered',this)">Delivered</button>
          <button class="filter-btn" onclick="filterOrders('cancelled',this)">Cancelled</button>
        </div>

        <!-- Orders list -->
        <div id="ordersList">
          <div class="empty-orders"><div class="spinner"></div><p>Loading your orders…</p></div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Track Modal -->
<div class="track-modal-bg" id="trackModal">
  <div class="track-modal">
    <button class="close-btn" onclick="closeTrack()">×</button>
    <h3>📍 Order Tracking</h3>
    <div style="margin-bottom:16px;">
      <strong id="trackOrderNum" style="color:var(--green);font-size:.95rem;"></strong>
      <span class="status-badge" id="trackStatus" style="margin-left:10px;"></span>
    </div>
    <div class="timeline" id="trackTimeline"></div>
  </div>
</div>

<script src="api.js"></script>
<script>
let allOrders = [];

const STATUS_STEPS = ['pending','confirmed','processing','shipped','delivered'];

function getEmoji(name) {
  const n = (name||'').toLowerCase();
  if (n.includes('masala')||n.includes('chilli')) return '🌶️';
  if (n.includes('oil'))    return '🫙';
  if (n.includes('soap'))   return '🧼';
  if (n.includes('noodle')||n.includes('semiya')) return '🍜';
  if (n.includes('rice')||n.includes('kavuni'))   return '🍚';
  return '🌾';
}

function statusClass(s) {
  const m = { pending:'status-pending', confirmed:'status-confirmed', processing:'status-processing', shipped:'status-shipped', delivered:'status-delivered', cancelled:'status-cancelled' };
  return m[s] || 'status-pending';
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
}

function renderOrders(orders) {
  const list = document.getElementById('ordersList');
  if (!orders.length) {
    list.innerHTML = `<div class="empty-orders"><div class="icon">📦</div><h3>No orders found</h3><p>You haven't placed any orders in this category yet.</p><a href="index.html" class="btn btn-primary">Start Shopping</a></div>`;
    return;
  }
  list.innerHTML = orders.map(o => {
    const canCancel = ['pending','confirmed'].includes(o.status);
    return `
    <div class="order-card">
      <div class="order-head">
        <div class="order-meta">
          <span class="order-num">#${o.order_number}</span>
          <span class="order-date">🗓 ${formatDate(o.created_at)}</span>
          <span class="order-total">₹${o.total}</span>
          <span style="font-size:.8rem;color:var(--gray-400);">${o.payment_method === 'cod' ? '💵 COD' : '📱 Online'}</span>
        </div>
        <span class="status-badge ${statusClass(o.status)}">${o.status}</span>
      </div>
      <div class="order-items">
        ${(o.items || []).map(i => `
        <div class="order-item-row">
          <div class="oi-thumb">${getEmoji(i.name)}</div>
          <div class="oi-info">
            <h4>${i.name}</h4>
            <p>${i.unit || ''} × ${i.quantity}</p>
          </div>
          <span class="oi-price">₹${(i.price * i.quantity).toFixed(0)}</span>
        </div>`).join('')}
      </div>
      <div class="order-foot">
        <div class="order-foot-left">
          📍 ${o.address ? o.address.city + ', ' + o.address.state : '—'}
        </div>
        <div class="order-foot-right">
          ${o.status !== 'cancelled' ? `<button class="action-btn track" onclick="openTrack(${JSON.stringify(o).replace(/"/g,'&quot;')})">📍 Track</button>` : ''}
          <button class="action-btn reorder" onclick="reorder(${JSON.stringify(o.items||[]).replace(/"/g,'&quot;')})">🔄 Reorder</button>
          ${canCancel ? `<button class="action-btn cancel" onclick="cancelOrder('${o.id}',this)">Cancel</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterOrders(status, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status);
  renderOrders(filtered);
}

function openTrack(order) {
  document.getElementById('trackOrderNum').textContent = '#' + order.order_number;
  const sb = document.getElementById('trackStatus');
  sb.textContent = order.status;
  sb.className = 'status-badge ' + statusClass(order.status);
  const activeIdx = order.status === 'cancelled' ? -1 : STATUS_STEPS.indexOf(order.status);
  const steps = [
    { label:'Order Placed',      time: order.created_at },
    { label:'Order Confirmed',   time: order.confirmed_at   || null },
    { label:'Being Processed',   time: order.processing_at  || null },
    { label:'Shipped',           time: order.shipped_at     || null },
    { label:'Delivered',         time: order.delivered_at   || null },
  ];
  document.getElementById('trackTimeline').innerHTML = order.status === 'cancelled'
    ? `<div class="tl-item done"><div class="tl-dot"></div><div class="tl-title">Order Placed</div><div class="tl-time">${formatDate(order.created_at)}</div></div>
       <div class="tl-item active"><div class="tl-dot"></div><div class="tl-title" style="color:#ef4444;">Order Cancelled</div><div class="tl-time">${order.cancelled_at ? formatDate(order.cancelled_at) : '—'}</div></div>`
    : steps.map((s, i) => {
        const cls = i < activeIdx ? 'done' : i === activeIdx ? 'active' : '';
        return `<div class="tl-item ${cls}"><div class="tl-dot"></div><div class="tl-title">${s.label}</div><div class="tl-time">${s.time ? formatDate(s.time) : cls ? '—' : 'Pending'}</div></div>`;
      }).join('');
  document.getElementById('trackModal').classList.add('show');
}

function closeTrack() {
  document.getElementById('trackModal').classList.remove('show');
}

async function cancelOrder(id, btn) {
  if (!confirm('Are you sure you want to cancel this order?')) return;
  btn.textContent = 'Cancelling…'; btn.disabled = true;
  try {
    await apiFetch('/orders/' + id + '/cancel', { method:'POST' });
    showToast('Order cancelled successfully.');
    loadOrders();
  } catch(e) {
    showToast(e.message || 'Could not cancel order.', true);
    btn.textContent = 'Cancel'; btn.disabled = false;
  }
}

async function reorder(items) {
  if (!items.length) return;
  let added = 0;
  for (const item of items) {
    try { await CartAPI.add(item.product_id, item.quantity); added++; } catch {}
  }
  if (added) { showToast(added + ' item(s) added to cart!'); setTimeout(() => window.location.href = 'cart.html', 1000); }
  else showToast('Could not add items to cart.', true);
}

async function loadOrders() {
  if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
  const user = Auth.getUser();
  if (user) {
    document.getElementById('sidebarName').textContent  = user.name || 'My Account';
    document.getElementById('sidebarEmail').textContent = user.email || '';
    document.getElementById('sidebarAvatar').textContent = (user.name || 'U')[0].toUpperCase();
  }
  try {
    allOrders = await OrdersAPI.mine();
    const delivered = allOrders.filter(o => o.status === 'delivered').length;
    const spent     = allOrders.reduce((s, o) => s + (o.total || 0), 0);
    document.getElementById('statTotal').textContent     = allOrders.length;
    document.getElementById('statDelivered').textContent = delivered;
    document.getElementById('statSpent').textContent     = '₹' + spent.toFixed(0);
    renderOrders(allOrders);
  } catch(e) {
    document.getElementById('ordersList').innerHTML = `<div class="empty-orders"><div class="icon">⚠️</div><h3>${e.message}</h3></div>`;
  }
}

document.getElementById('trackModal').addEventListener('click', function(e) {
  if (e.target === this) closeTrack();
});

document.addEventListener('DOMContentLoaded', loadOrders);
</script>
</body>
</html>
